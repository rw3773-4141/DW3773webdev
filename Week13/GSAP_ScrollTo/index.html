<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elevator Scrolling Example</title>
    <style type="text/css" media="screen">

      body {
        font-family: Arial, sans-serif;
        margin-top: 40px;
        background-color: rgb(50, 50, 50);
        color: white;
        padding-top: 100px;
      }

      main {
        margin: 0 auto;
        width: 800px;
      }

      section{
        padding: 20px 0 80px 0;
        height: 100vh;

      }

      section h2 {
        font-size: 40px;
        border-bottom: 2px solid #ccc;
        padding-bottom: 20px;
      }

      ul {
        position: fixed;
        top: 40%;
        right: 0;
        list-style-type: none;
      }

      li {
        width: 30px;
        padding: 10px;
        margin-bottom: 1px;
        color: #ccc;
        margin-left: 10px solid #333;
        cursor: pointer;
        transition: all 0.5s;

      }

      .active {
        color: #fff;
        border-left: 3px solid #fff;
      }

    </style>
  </head>
  <body>
    <!-- elevator buttons -->
    <ul>
      <li id="floor5Btn">5</li>
      <li id="floor4Btn">4</li>
      <li id="floor3Btn">3</li>
      <li id="floor2Btn">2</li>
      <li id="floor1Btn">1</li>
    </ul>

    <!-- floors -->
    <div id="main">
      <section id="floor5Panel">
        <h2>Floor 5</h2>
      </section>

      <section id="floor4Panel">
        <h2>Floor 4</h2>
      </section>

      <section id="floor3Panel">
        <h2>Floor 3</h2>
      </section>

      <section id="floor2Panel">
        <h2>Floor 2</h2>
      </section>

      <section id="floor1Panel">
        <h2>Floor 1</h2>
      </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollToPlugin.min.js"></script>
    <script type="text/javascript">
      // wait for the content to load on the screen
      document.addEventListener('DOMContentLoaded', () => {
        // fade in content on load
        gsap.from ('body', 1, {opacity:0})
        gsap.from ('ul', 1, {right: -500, delay: 0.5})

        // grad each button by id and assign them to variables
        const floor1Btn = document.getElementById('floor1Btn');
        const floor2Btn = document.getElementById('floor2Btn');
        const floor3Btn = document.getElementById('floor3Btn');
        const floor4Btn = document.getElementById('floor4Btn');
        const floor5Btn = document.getElementById('floor5Btn');

        let navButtons = document.getElementsByClassName('LI')
        // this will log an HTML collection, not an array
        console.log(navButtons)
        navButtons =[].slice.call(navButtons) 
        console.log(navButtons)

        // add active on mouse center
        navButtons.forEach(button => {
          button.addEventListener('mouseenter', function() {
            gsap.to(this, {className: 'active', duration: 1})
          })
          button.addEventListener('mouseleave', function() {
            gsap.to(this, {className: '', duration: 1})
          })
        })
        console.log(document.querySelector('#floor2Panel').getBoundingClientRect()[0].top)

        // assign on HTML5 attribute to each button baseon the floor top position
        floor1Btn.setAttribute('data-scrollpos',document.querySelector('#floor1Panel').getBoundingClientRect()[0].top)
        floor2Btn.setAttribute('data-scrollpos',document.querySelector('#floor2Panel').getBoundingClientRect()[0].top)
        floor3Btn.setAttribute('data-scrollpos',document.querySelector('#floor3Panel').getBoundingClientRect()[0].top)
        floor4Btn.setAttribute('data-scrollpos',document.querySelector('#floor4Panel').getBoundingClientRect()[0].top)
        floor5Btn.setAttribute('data-scrollpos',document.querySelector('#floor5Panel').getBoundingClientRect()[0].top)

        navButtons.forEach(button => {
          button.addEventListener('click', function() {
            const myScrollpos = this.getAttribute('data-scrollpos')
            gsap.to(window, 1, {scrollTo: myScrollpos})
          })
        })
      })

      // set the scroll position to the top of each of the floor ssection
      

    </script>
  </body>
</html>
