      // whenever you use await you have to be in an async function
      async function logApiResults (){
        // await =  waits for the promise to resolve before moving on to the next line of code
        const response = await fetch('https://rickandmortyapi.com/api/character/34')
        //console.log(response);
        const result = await response.json();
        //console.log(result);
        return result;
      }
      const myApiResult = {}

      logApiResults().then((data) => {
        myApiResults = data;
        // this is how we could populate some html elements on the page with the data we just retrived
        console.log(myApiResults);
        const message = `${myApiResults.name} is a ${myApiResults.species} from ${myApiResults.origin.name} and they are ${myApiResults.status}`;
        console.log(message);
      }).catch((error) => {
        console.error(error);
      });
