<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JS Objects Lesson</title>
  </head>
  <body>
    <h1>Open the Console to see your output!</h1>

    <script>
      // Your JavaScript goes here
    const person = {
        name: "Alex",
        age: 22,
        isStudent: true
    };
    console.log(person);
    console.log(person.name); // Alex
    console.log(person.age);

    console.log(person["name"]); // Alex
    console.log(person["age"]); //22

    const movie = {
        title: "Inception",
        year: 2010,
        director: "Christopher Nolan"
    };

    // 1. Log the title using dot notation
    console.log(movie.title);

    // 2. Log the director using bracket notation
    console.log(movie["director"]);

    // 3. Store "year" in a variable, then use it to log the year
    let field = "year";
    console.log(movie[field]);

    const car = {
        make: "Toyota",
        model: "Camry",
        year: 2020,
    };

    // 1. Update the year to 2024
    car.year = 2024;

    // 2. Add a color property set to any color you like
    car.color = "blue";

    // 3. Delete the model property
    delete car.model;

    // 4. Log the full object to see the result
    console.log(car);

    const dog = {
        name: "Biscuit",
        breed: "Beagle",
        bark() {
            console.log(this.name + " says: Woof!");
        }
    };

    // 1. Call bark()
    dog.bark();

    // 2. Add a method called "describe" that logs:
    //    "Biscuit is a Beagle"
    //    (use this.name and this.breed)
    dog.describe = function () {
        console.log(this.name + " is a " + this.breed);
    };
    dog.describe();
    
    const laptop = {
        brand: "Apple",
        model: "MacBook Pro",
        ram: 16,
        storage: 512,
    };

    // 1. Log all the keys
    console.log(Object.keys(laptop));

    // 2. Log all the values
    console.log(Object.values(laptop));

    // 3. Log all key-value pairs
    console.log(Object.entries(laptop));

    const obj = {
        title: "The Great Gatsby",
        author: "F. Scott Fitzgerald",
        pages: 180,
        isAvailable: true,
    }
    console.log(obj.title);
    console.log(obj["author"]);
    obj.genre = "Classic";
    console.log(obj.genre);
    obj.isAvailable = false;
    console.log(obj.isAvailable);
    const describe = function(){
        console.log(this.title + "by" + this.author + "-" + this.pages + "pages")
    };
    obj.describe();
    console.log(Object.keys(obj));

    

    </script>
  </body>
</html>
